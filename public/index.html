<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8">
  <title>FitTrack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
  <a href="/">Тренировки</a> |
  <a href="/meals.html">Хранене</a>
</nav>
<hr>
  <h1>🏋️ FitTrack</h1>
  <p>Проследяване на тренировки</p>

  <h2>Добави тренировка</h2>
  <form id="workoutForm">
    <input type="text" id="name" placeholder="Име" required>
    <input type="text" id="description" placeholder="Описание">
    <input type="number" id="duration" placeholder="Минути" required>
    <input type="number" step="0.1" id="calories" placeholder="Калории/минута">
    <button type="submit">Добави</button>
  </form>

  <h2>Списък с тренировки</h2>
  <ul id="workouts"></ul>

  <script src="script.js"></script>
</body>
</html>
